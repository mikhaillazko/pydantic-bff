name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # Use PyPI trusted publishing — no long-lived token required.
    # Configure the publisher on PyPI:
    #   https://pypi.org/manage/project/pydantic-bff/settings/publishing/
    #   owner: mikhaillazko, repo: pydantic-bff, workflow: publish.yml, environment: pypi
    environment:
      name: pypi
      url: https://pypi.org/p/pydantic-bff

    permissions:
      id-token: write  # required for trusted publishing via OIDC

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
